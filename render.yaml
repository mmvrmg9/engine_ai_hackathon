services:
  - type: web
    name: endo-loop-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENDO_LOOP_LLM_MODEL
        value: claude-opus-4-8
