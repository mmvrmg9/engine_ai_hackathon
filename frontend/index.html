<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Endo Loop</title><style>body{font-family:system-ui;margin:0;background:#fff8f6;color:#352c32}main{max-width:760px;margin:auto;padding:28px 18px}h1{color:#9c3850}.tabs{display:flex;gap:8px;flex-wrap:wrap}button{border:0;border-radius:10px;padding:10px 14px;background:#9c3850;color:white;cursor:pointer}.card{background:white;border-radius:16px;padding:18px;margin:14px 0;box-shadow:0 2px 12px #3b263016}.muted{color:#756b72}.tag{display:inline-block;background:#f7dfe2;color:#80283d;border-radius:99px;padding:4px 9px;font-size:12px}li{margin:8px 0}</style></head><body><main><h1>Endo Loop</h1><p class="muted">Notice the pattern across days. Prepare a better conversation.</p><div class="tabs" id="tabs"></div><section id="content"><p>Loading…</p></section></main><script>const api='http://localhost:8000';let pid='P001';async function load(){let ps=await fetch(api+'/patients').then(r=>r.json());document.querySelector('#tabs').innerHTML=ps.map(p=>`<button onclick="pid='${p.id}';load()">${p.name} · ${p.journey_stage.replace('_',' ')}</button>`).join('');let d=await fetch(api+'/patients/'+pid+'/patterns').then(r=>r.json());document.querySelector('#content').innerHTML=d.patterns.map(x=>`<article class="card"><span class="tag">${x.confidence}</span><h2>${x.title}</h2><p>${x.wording}</p><p><b>Next step:</b> ${x.next_step}</p><details><summary>Evidence (${x.sample_count} entries)</summary><pre>${JSON.stringify(x.evidence,null,2)}</pre></details></article>`).join('')}</script></body></html>
